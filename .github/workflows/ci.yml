name: CI

# Fires on pull_request and on push to main. Runs the unit +
# integration tiers across supported Python versions. No publish /
# release jobs — release.yml is manually dispatched from the Actions
# tab when a release is ready to cut.
#
# Tiers (post-enhancement):
#   - core: unit + integration via release_regression_test.py. Required
#     on (linux, macos) x (3.12, 3.13, 3.14).
#   - multi-proc: pub_server in one process, sub_bench in another.
#     Catches Phase-7 backpressure / control-stream parser regressions
#     that single-process loopback masks. continue-on-error initially.
#   - cross-impl: aiomoqt sub_bench against cloudflare/moq-rs draft-14
#     relay running in a Docker container. continue-on-error initially.
#   - perf-gate: parser microbench short window. continue-on-error
#     initially.
#
# The interop tier (live external relays) stays in interop-regression.yml
# but gains a PR-label trigger there so contributors can opt-in.

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt every job + every third-party action into the Node 24 runtime
# ahead of GitHub's 2026-06-02 hard cutover (Node 20 removed entirely
# 2026-09-16). One env beats per-action version cherry-picking and
# covers actions that haven't shipped a Node-24 release yet.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  core:
    name: core / ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-aiomoqt
        with:
          python-version: ${{ matrix.python-version }}
      - name: Generate self-signed cert for loopback
        run: |
          mkdir -p certs
          openssl req -x509 -newkey rsa:2048 -nodes \
            -keyout certs/key.pem -out certs/cert.pem \
            -days 1 -subj "/CN=localhost"
      - name: Run unit + integration tiers
        run: |
          # On macOS the native QUIC connection close stalls ~10s when a
          # fetch stream is left un-drained at session exit (confirmed on a
          # real macOS box — it's the aiopquic/picoquic close drain over
          # loopback, NOT pytest teardown), so loopback-fetch tips over its
          # timeout and flakes. Skip it on macOS: the fetch logic is
          # platform-independent (covered on Linux) and the bench matrix
          # covers macOS loopback delivery. Tracked as an aiopquic follow-up.
          SKIP=""
          [ "$RUNNER_OS" = "macOS" ] && SKIP="--skip-suite loopback-fetch"
          python tests/release_regression_test.py \
            --test-tier unit --test-tier integration $SKIP \
            --log-dir "${RUNNER_TEMP}/aiomoqt-regression"
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-logs-${{ matrix.os }}-py${{ matrix.python-version }}
          path: ${{ runner.temp }}/aiomoqt-regression/

  multi-proc:
    name: pub-sub test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-aiomoqt
      - name: Generate self-signed cert
        run: |
          mkdir -p certs
          openssl req -x509 -newkey rsa:2048 -nodes \
            -keyout certs/key.pem -out certs/cert.pem \
            -days 1 -subj "/CN=localhost"
      - name: pub_server <-> sub_bench loopback smoke (raw QUIC)
        timeout-minutes: 4
        run: |
          # Spawn pub_server in background, run sub_bench against it.
          # Asserts at least some object delivery in a 12 s window.
          # Catches Phase-7 backpressure / TX-ring-fill stalls that
          # in-process loopback doesn't exercise.
          # -u so the "ready on" banner reaches /tmp/pub-srv.log
          # before our poll grep runs (Python buffers stdout in 4KB
          # chunks when redirected to a file).
          python -u -m aiomoqt.examples.pub_server \
            --cert certs/cert.pem --key certs/key.pem \
            -p 4434 -s 4096 -g 10000 -P 1 \
            --draft 16 --quic > /tmp/pub-srv.log 2>&1 &
          PUB_PID=$!
          # Poll up to 10s for pub_server's "ready on" line. Bare
          # `sleep 1.5` was flaky on busier Linux runners — pub_server
          # not yet bound at 1.5s leads to sub_bench connect failure
          # which then hangs in await track.subscribe() (no upper
          # time bound there, -t only applies post-subscribe).
          for i in $(seq 1 20); do
            if grep -q "ready on" /tmp/pub-srv.log 2>/dev/null; then
              echo "pub_server ready after $((i*500))ms"
              break
            fi
            sleep 0.5
          done
          if ! grep -q "ready on" /tmp/pub-srv.log 2>/dev/null; then
            echo "FAIL: pub_server not ready in 10s"
            tail -20 /tmp/pub-srv.log
            kill $PUB_PID 2>/dev/null || true
            exit 1
          fi
          # sub_bench's -t timeout doesn't reliably fire (track.
          # wait_closed timeout=12 keeps running into bufferbloat at
          # this rate). Wrap with a bash watchdog so the step always
          # captures sub.log before the runner SIGTERMs us — bounded
          # cleanup + visible failure mode. The underlying sub_bench
          # -t bug is tracked for 0.9.6.
          python -u -m aiomoqt.examples.sub_bench \
            -q --draft 16 -n aiomoqt --trackname track \
            -t 12 -i 5 moqt://localhost:4434 \
            > /tmp/sub.log 2>&1 &
          SUB_PID=$!
          # Up to 20s (12s -t + 8s slack), then force-kill.
          for i in $(seq 1 40); do
            if ! kill -0 $SUB_PID 2>/dev/null; then break; fi
            sleep 0.5
          done
          kill $SUB_PID 2>/dev/null || true
          sleep 0.5
          kill -9 $SUB_PID 2>/dev/null || true
          wait $SUB_PID 2>/dev/null || true
          kill $PUB_PID 2>/dev/null || true
          echo === sub.log ===
          tail -30 /tmp/sub.log
          echo === pub-srv.log ===
          tail -20 /tmp/pub-srv.log
          # Assertion reads the per-interval table (always emitted even
          # when watchdog kills sub_bench) instead of the "Objects:"
          # summary block (only emitted on natural exit). Interval
          # format: "  10-15s    65      642256    29330/s   964Mbps ..."
          # — column 3 is the cumulative obj count.
          LAST_OBJS=$(grep -oE '^[[:space:]]+[0-9]+-[0-9]+s[[:space:]]+[0-9]+[[:space:]]+[0-9]+' /tmp/sub.log | tail -1 | awk '{print $3}')
          if [ -z "$LAST_OBJS" ]; then
            echo "FAIL: no interval data in sub.log — sub_bench did not run"
            exit 1
          fi
          if [ "$LAST_OBJS" -lt 100 ]; then
            echo "FAIL: only $LAST_OBJS objects"
            exit 1
          fi
          echo "OK: $LAST_OBJS objects in last interval"

  peer-interop:
    name: peer interop
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-aiomoqt
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cargo build cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: moq-rs -> moq-rs/target
          shared-key: moq-rs-d14
      - name: Generate self-signed cert
        run: |
          mkdir -p certs
          openssl req -x509 -newkey rsa:2048 -nodes \
            -keyout certs/key.pem -out certs/cert.pem \
            -days 1 -subj "/CN=localhost" \
            -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"
      - name: Clone + build cloudflare/moq-rs (d14)
        run: |
          git clone --depth=1 https://github.com/cloudflare/moq-rs.git
          cd moq-rs
          cargo build --release --bin moq-relay-ietf --bin moq-clock-ietf
      - name: Start relay + clock publisher
        run: |
          ./moq-rs/target/release/moq-relay-ietf \
            --bind "[::]:4443" \
            --tls-cert certs/cert.pem \
            --tls-key certs/key.pem \
            --dev > /tmp/relay.log 2>&1 &
          # Wait for relay to be ready.
          for i in $(seq 1 30); do
            sleep 1
            if grep -q "listening on" /tmp/relay.log 2>/dev/null; then
              echo "relay up after ${i}s"
              break
            fi
          done
          ./moq-rs/target/release/moq-clock-ietf --tls-disable-verify \
            --publish --namespace clock --track now \
            https://localhost:4443 > /tmp/clock-pub.log 2>&1 &
          sleep 2
      - name: aiomoqt sub_bench against moq-rs relay (clock track)
        timeout-minutes: 3
        run: |
          timeout 12 python -m aiomoqt.examples.sub_bench \
            -n clock --trackname now --draft 14 -k -t 8 \
            https://localhost:4443 \
            > /tmp/sub.log 2>&1 || true
          echo === sub.log ===
          tail -25 /tmp/sub.log
          echo === relay.log ===
          tail -10 /tmp/relay.log
          # Require at least 5 clock objects (1 Hz publish rate).
          grep -E "Objects: *[0-9]+" /tmp/sub.log | tail -1 \
            | awk '{n=$2+0; if (n < 5) {print "FAIL: only " n " clock objs"; exit 1} else {print "OK: " n " clock objs"}}'
      - name: Cleanup
        if: always()
        run: |
          pkill -f moq-relay-ietf 2>/dev/null || true
          pkill -f moq-clock-ietf 2>/dev/null || true

  benchmark:
    name: benchmark
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-aiomoqt
      - name: Run parser microbench
        timeout-minutes: 5
        run: |
          # b1_parser is parser-only, no transport; reliable on
          # hosted runners. Floor enforcement deferred until we have
          # a few runs to calibrate runner noise.
          python -m aiomoqt.tests.microbench.b1_parser \
            --duration 3 || true
