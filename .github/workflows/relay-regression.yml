name: Relay regression

# The relay tier exercises live external relays (moqx-main, Cloudflare).
# It is not run on every PR because external availability is outside our
# control. Trigger manually from the Actions tab for release validation,
# or let the weekly schedule run it.

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'    # Mondays 03:17 UTC

jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.14"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install -e .
    - name: Run relay-tier regression
      run: python tests/release-regression-test.py --test-tier relay
    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: relay-regression-logs
        path: /tmp/aiomoqt-regression.*/
