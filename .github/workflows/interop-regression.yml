name: Interop regression

# The interop tier exercises live external relays listed in
# tests/relays.json. It is not run on every PR because external
# availability is outside our control. Trigger manually from the
# Actions tab for release validation, or let the weekly schedule run it.
#
# workflow_dispatch is restricted to repo collaborators with write access
# by default, so the button is not exposed to fork PRs or random viewers.

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'    # Mondays 03:17 UTC
  # PR opt-in: maintainer adds the `ci:run-interop` label when a PR
  # touches wire-format or session-protocol code. Triggers only on
  # the label event (not synchronize), so PR sync doesn't fire a
  # skipped run in the actions list. To re-run interop after new
  # commits on a labeled PR, toggle the label off and on.
  pull_request:
    types: [labeled]

# Opt every job + every third-party action into the Node 24 runtime
# ahead of GitHub's 2026-06-02 hard cutover (Node 20 removed entirely
# 2026-09-16). One env beats per-action version cherry-picking and
# covers actions that haven't shipped a Node-24 release yet.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  interop:
    # Skip on label-PR runs unless the label is actually present.
    # For workflow_dispatch + schedule there's no label gate.
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'ci:run-interop')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: ./.github/actions/setup-aiomoqt
    - name: Run interop-tier regression
      run: python tests/release_regression_test.py --test-tier interop
    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: interop-regression-logs
        path: /tmp/aiomoqt-regression.*/
