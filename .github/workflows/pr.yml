name: PR

# Fires on pull_request only. Runs the unit + integration tiers across
# supported Python versions. No publish/release jobs — those live in
# release.yml and fire on tag push.

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e '.[test]'
    - name: Generate self-signed cert for loopback
      run: |
        mkdir -p certs
        openssl req -x509 -newkey rsa:2048 -nodes \
          -keyout certs/key.pem -out certs/cert.pem \
          -days 1 -subj "/CN=localhost"
    - name: Run unit + integration tiers
      run: |
        python tests/release-regression-test.py \
          --test-tier unit --test-tier integration
    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: regression-logs-py${{ matrix.python-version }}
        path: /tmp/aiomoqt-regression.*/
