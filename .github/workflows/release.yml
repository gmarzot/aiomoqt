name: Release

# Manually triggered from the Actions tab. Creates the tag, runs a
# final test matrix as a gate, then publishes to TestPyPI -> PyPI,
# cuts a GitHub Release, and pushes the Docker image to GHCR.
#
# workflow_dispatch is restricted to repo collaborators with write
# access by GitHub's default policy, so this is effectively owner-only.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.8.2, must match N.N.N)'
        required: true
        type: string

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Validate version and create tag
      id: validate
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ inputs.version }}"
        if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "error: version must be N.N.N, got '$VERSION'" >&2
          exit 1
        fi
        if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; then
          echo "error: tag '$VERSION' already exists" >&2
          exit 1
        fi
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "$VERSION" -m "v$VERSION"
        git push origin "$VERSION"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  test:
    needs: tag
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.tag.outputs.version }}
        fetch-depth: 0
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e '.[test]'
    - name: Generate self-signed cert for loopback
      run: |
        mkdir -p certs
        openssl req -x509 -newkey rsa:2048 -nodes \
          -keyout certs/key.pem -out certs/cert.pem \
          -days 1 -subj "/CN=localhost"
    - name: Run unit + integration tiers
      run: |
        python tests/release_regression_test.py \
          --test-tier unit --test-tier integration
    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: regression-logs-py${{ matrix.python-version }}
        path: /tmp/aiomoqt-regression.*/

  publish-test:
    needs: [tag, test]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.tag.outputs.version }}
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    - name: Build and publish to TestPyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        TWINE_REPOSITORY_URL: https://test.pypi.org/legacy/
        PYTHONWARNINGS: "ignore::UserWarning"
      run: |
        python -m build
        twine upload dist/*

  publish-prod:
    needs: [tag, test, publish-test]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.tag.outputs.version }}
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    - name: Build and publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        TWINE_REPOSITORY_URL: https://upload.pypi.org/legacy/
        PYTHONWARNINGS: "ignore::UserWarning"
      run: |
        python -m build
        twine upload dist/*

  github-release:
    needs: [tag, publish-prod]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.tag.outputs.version }}
        fetch-depth: 0
    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ needs.tag.outputs.version }}"
        gh release create "$VERSION" \
          --title "v$VERSION" \
          --generate-notes \
          --verify-tag

  docker-publish:
    needs: [tag, publish-prod]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.tag.outputs.version }}
        fetch-depth: 0
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push Docker image
      run: |
        VERSION="${{ needs.tag.outputs.version }}"
        IMAGE=ghcr.io/${{ github.repository }}
        docker build \
          --build-arg VERSION="$VERSION" \
          -t "$IMAGE:$VERSION" -t "$IMAGE:latest" .
        docker push "$IMAGE:$VERSION"
        docker push "$IMAGE:latest"
